# =============================================================================
# vLLM vs SGLang Comparative Benchmark System
#
# Baseline services:
#   vllm          — vLLM OpenAI-compatible server        (port 8000)
#   sglang        — SGLang server                         (port 8001)
#
# Speculative decoding variants (one per port — run sequentially):
#   vllm-eagle3   — vLLM + Eagle3 speculative decoding   (port 8000)
#   vllm-ngram    — vLLM + Ngram speculative decoding    (port 8000)
#   sglang-eagle3 — SGLang + Eagle3 spec decoding        (port 8001)
#   sglang-ngram  — SGLang + Ngram spec decoding         (port 8001)
#
#   dashboard     — FastAPI benchmark dashboard           (port 3000)
#
# Model weights are cached in ./model-cache (mounted into all engine containers).
# Set HUGGING_FACE_HUB_TOKEN in a .env file for gated models.
# Set EAGLE3_VLLM_DRAFT / EAGLE3_SGLANG_DRAFT for custom Eagle3 draft models.
# =============================================================================

x-gpu-resources: &gpu-resources
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["0"]
            capabilities: [gpu]

x-model-cache: &model-cache
  type: bind
  source: ./model-cache
  target: /root/.cache/huggingface

services:
  # ---------------------------------------------------------------------------
  # vLLM
  # ---------------------------------------------------------------------------
  vllm:
    profiles: ["vllm"]
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.18.0-cu130}
    container_name: vllm-server
    ports:
      - "8000:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=0
      - MODEL=${MODEL:-Qwen/Qwen3-8B}
      - MAX_MODEL_LEN=${MAX_MODEL_LEN:-8192}
      # Optional extra flags (e.g. --enforce-eager --disable-frontend-multiprocessing for Gemma 3)
      - EXTRA_VLLM_ARGS=${EXTRA_VLLM_ARGS:-}
    volumes:
      - <<: *model-cache
    shm_size: "10gb"
    entrypoint: ["sh", "-c"]
    command:
      - >
        python3 -m vllm.entrypoints.openai.api_server
        --model "$MODEL"
        --host 0.0.0.0
        --port 8000
        --enable-prefix-caching
        --max-model-len "$MAX_MODEL_LEN"
        --gpu-memory-utilization 0.85
        --served-model-name "$MODEL"
        $EXTRA_VLLM_ARGS
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    <<: *gpu-resources

  # ---------------------------------------------------------------------------
  # SGLang
  # ---------------------------------------------------------------------------
  sglang:
    profiles: ["sglang"]
    image: ${SGLANG_IMAGE:-lmsysorg/sglang:nightly-dev-cu13-20260321-94194537}
    container_name: sglang-server
    ports:
      - "8001:8001"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - <<: *model-cache
    shm_size: "10gb"
    command:
      - "python"
      - "-m"
      - "sglang.launch_server"
      - "--model-path"
      - "${MODEL:-Qwen/Qwen3-8B}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "--mem-fraction-static"
      - "0.85"
      - "--context-length"
      - "${MAX_MODEL_LEN:-8192}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    <<: *gpu-resources

  # ---------------------------------------------------------------------------
  # vLLM + Eagle3 speculative decoding
  # Requires: EAGLE3_VLLM_DRAFT env var pointing to a compatible Eagle3 draft model.
  # Default draft: RedHatAI/Llama-3.1-8B-Instruct-speculator.eagle3 (Llama 3.1 8B only)
  # NOTE: No Eagle3 draft exists yet for Qwen3-8B — only run with Llama 3.1 8B.
  # gpu-memory-utilization reduced to 0.75 to leave room for both model weights on A10G.
  # start_period extended to 240s — two models load on startup.
  # ---------------------------------------------------------------------------
  vllm-eagle3:
    profiles: ["vllm-eagle3"]
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.18.0-cu130}
    container_name: vllm-eagle3-server
    ports:
      - "8000:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=0
      - MODEL=${MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      - EAGLE3_VLLM_DRAFT=${EAGLE3_VLLM_DRAFT:-RedHatAI/Llama-3.1-8B-Instruct-speculator.eagle3}
      - MAX_MODEL_LEN=${MAX_MODEL_LEN:-4096}
    volumes:
      - <<: *model-cache
    shm_size: "10gb"
    entrypoint: ["sh", "-c"]
    command:
      - >
        python3 -m vllm.entrypoints.openai.api_server
        --model "$MODEL"
        --host 0.0.0.0
        --port 8000
        --enable-prefix-caching
        --max-model-len "$MAX_MODEL_LEN"
        --gpu-memory-utilization 0.75
        --served-model-name "$MODEL"
        --speculative-config "{\"method\":\"eagle3\",\"model\":\"$EAGLE3_VLLM_DRAFT\",\"num_speculative_tokens\":3}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s
    <<: *gpu-resources

  # ---------------------------------------------------------------------------
  # vLLM + Ngram speculative decoding
  # No draft model needed — uses prompt n-gram lookup for speculation.
  # ---------------------------------------------------------------------------
  vllm-ngram:
    profiles: ["vllm-ngram"]
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.18.0-cu130}
    container_name: vllm-ngram-server
    ports:
      - "8000:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=0
      - MODEL=${MODEL:-Qwen/Qwen3-8B}
      - MAX_MODEL_LEN=${MAX_MODEL_LEN:-8192}
      - EXTRA_VLLM_ARGS=${EXTRA_VLLM_ARGS:-}
    volumes:
      - <<: *model-cache
    shm_size: "10gb"
    entrypoint: ["sh", "-c"]
    command:
      - >
        python3 -m vllm.entrypoints.openai.api_server
        --model "$MODEL"
        --host 0.0.0.0
        --port 8000
        --enable-prefix-caching
        --max-model-len "$MAX_MODEL_LEN"
        --gpu-memory-utilization 0.85
        --served-model-name "$MODEL"
        --speculative-config '{"method":"ngram","num_speculative_tokens":5,"prompt_lookup_max":4}'
        $EXTRA_VLLM_ARGS
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    <<: *gpu-resources

  # ---------------------------------------------------------------------------
  # SGLang + Eagle3 speculative decoding
  # Requires: EAGLE3_SGLANG_DRAFT env var pointing to a compatible Eagle3 draft model.
  # Default draft: jamesliu1/sglang-EAGLE3-Llama-3.1-Instruct-8B (Llama 3.1 8B only)
  # NOTE: No Eagle3 draft exists yet for Qwen3-8B — only run with Llama 3.1 8B.
  # mem-fraction-static reduced to 0.65 to leave room for both model weights on A10G.
  # start_period extended to 240s — two models load on startup.
  # ---------------------------------------------------------------------------
  sglang-eagle3:
    profiles: ["sglang-eagle3"]
    image: ${SGLANG_IMAGE:-lmsysorg/sglang:nightly-dev-cu13-20260321-94194537}
    container_name: sglang-eagle3-server
    ports:
      - "8001:8001"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=0
      - MODEL=${MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      - EAGLE3_SGLANG_DRAFT=${EAGLE3_SGLANG_DRAFT:-jamesliu1/sglang-EAGLE3-Llama-3.1-Instruct-8B}
      - MAX_MODEL_LEN=${MAX_MODEL_LEN:-4096}
    volumes:
      - <<: *model-cache
    shm_size: "10gb"
    entrypoint: ["sh", "-c"]
    command:
      - >
        python -m sglang.launch_server
        --model-path "$MODEL"
        --host 0.0.0.0
        --port 8001
        --mem-fraction-static 0.65
        --context-length "$MAX_MODEL_LEN"
        --speculative-algorithm EAGLE3
        --speculative-draft-model-path "$EAGLE3_SGLANG_DRAFT"
        --speculative-num-steps 3
        --speculative-eagle-topk 4
        --speculative-num-draft-tokens 16
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    <<: *gpu-resources

  # ---------------------------------------------------------------------------
  # SGLang + Ngram speculative decoding
  # No draft model needed.
  # ---------------------------------------------------------------------------
  sglang-ngram:
    profiles: ["sglang-ngram"]
    image: ${SGLANG_IMAGE:-lmsysorg/sglang:nightly-dev-cu13-20260321-94194537}
    container_name: sglang-ngram-server
    ports:
      - "8001:8001"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - <<: *model-cache
    shm_size: "10gb"
    command:
      - "python"
      - "-m"
      - "sglang.launch_server"
      - "--model-path"
      - "${MODEL:-Qwen/Qwen3-8B}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "--mem-fraction-static"
      - "0.85"
      - "--context-length"
      - "${MAX_MODEL_LEN:-8192}"
      - "--speculative-algorithm"
      - "NGRAM"
      - "--speculative-num-draft-tokens"
      - "16"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    <<: *gpu-resources

  # ---------------------------------------------------------------------------
  # Dashboard
  # ---------------------------------------------------------------------------
  dashboard:
    profiles: ["dashboard"]
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: benchmark-dashboard
    ports:
      - "3000:3000"
    volumes:
      - ./results:/app/results
    environment:
      - VLLM_HOST=vllm
      - VLLM_PORT=8000
      - SGLANG_HOST=sglang
      - SGLANG_PORT=8001
      - RESULTS_DIR=/app/results
    # Keep dashboard decoupled from engine startup so single-GPU benchmark flows
    # can run one engine at a time without compose forcing both to be healthy.
    command:
      - "python"
      - "-m"
      - "uvicorn"
      - "dashboard.app:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "3000"

volumes:
  model-cache:
    driver: local
