# Known-good override for running microsoft/Phi-3-mini-4k-instruct on a single
# NVIDIA A10G 24 GB with SGLang on this benchmark stack.
#
# Why this exists:
# - Default SGLang on this setup was hitting the FlashInfer/CUDA graph path and
#   failing on Phi-3 mini (`unsupported head_dim=96`).
# - This override switches to safer backends that successfully smoke-tested on
#   the GPU host.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.phi3mini-sglang-a10g.yml --profile sglang up -d sglang

services:
  sglang:
    command:
      - "python"
      - "-m"
      - "sglang.launch_server"
      - "--model-path"
      - "microsoft/Phi-3-mini-4k-instruct"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "--mem-fraction-static"
      - "0.75"
      - "--context-length"
      - "4096"
      - "--attention-backend"
      - "triton"
      - "--sampling-backend"
      - "pytorch"
      - "--disable-cuda-graph"
